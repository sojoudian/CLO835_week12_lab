# Workshop 2 — a namespaced Role that allows read access to Services only.
# Bound to the clo835 ServiceAccount with a RoleBinding (see commands.sh).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: service-reader
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
